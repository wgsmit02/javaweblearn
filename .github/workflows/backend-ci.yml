name: Backend CI

# Triggers: run this workflow on every push or pull request to main
on:
  push:
    branches: [ "main" ]
    paths:
      - "backend/**"          # only run when backend files change
      - ".github/workflows/**"
  pull_request:
    branches: [ "main" ]
    paths:
      - "backend/**"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest  # GitHub provides this VM for free

    # Spin up a real PostgreSQL service container for integration tests
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: taskmanager_test
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: taskpassword
        ports:
          - 5432:5432
        # Wait until postgres is healthy before running tests
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # 1. Check out your code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          # Cache Maven dependencies between runs — speeds up subsequent builds
          cache: maven

      # 3. Run tests (Maven will compile + test)
      - name: Run tests
        working-directory: backend
        env:
          # Override application.properties with CI database credentials
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/taskmanager_test
          SPRING_DATASOURCE_USERNAME: admin
          SPRING_DATASOURCE_PASSWORD: taskpassword
        run: mvn test

      # 4. Package the app (build the .jar)
      - name: Package application
        working-directory: backend
        run: mvn package -DskipTests

      # 5. Build the Docker image to verify the Dockerfile is valid
      - name: Build Docker image
        working-directory: backend
        run: docker build -t taskmanager-api:${{ github.sha }} .

      # 6. Upload the .jar as a build artifact (downloadable from GitHub)
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: taskmanager-api-jar
          path: backend/target/*.jar
          retention-days: 7
