# Server
server.port=8080

# Database connection
# These values match what we'll define in docker-compose.yml
spring.datasource.url=jdbc:postgresql://localhost:5432/taskmanager
spring.datasource.username=admin
spring.datasource.password=Nashville2025
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate settings
# ddl-auto=update: Hibernate will automatically create/update database tables
# based on your Java entity classes. Never use this in production.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# App name (shows up in logs)
spring.application.name=taskmanager-api
