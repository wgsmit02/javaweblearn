# =============================================
# Base config — shared across all environments
# Profile-specific files override these values
# =============================================

# Active profile: dev locally, overridden to "prod" via environment variable in Docker
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Server
server.port=8080

# Database — values come from environment variables (set in docker-compose.yml)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/taskmanager}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Nashville2025}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA base config
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# App name
spring.application.name=taskmanager-api

# JWT secret — override in production via environment variable
app.jwt.secret=${JWT_SECRET:dev-secret-key-change-in-production-must-be-at-least-32-chars}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
