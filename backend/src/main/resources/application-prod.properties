# =============================================
# PROD profile — production overrides
# =============================================

# No SQL logging in production (performance + security)
spring.jpa.show-sql=false

# Swagger disabled — never expose API docs publicly
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# validate: checks schema matches entities but does NOT modify tables
# In production, schema changes are handled by migration tools (Flyway/Liquibase)
spring.jpa.hibernate.ddl-auto=validate

# Hide internal error details from API responses
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
