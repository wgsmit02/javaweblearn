server {
    listen 80;
    server_name _;

    # Serve the React build output
    root /usr/share/nginx/html;
    index index.html;

    # For React Router — serve index.html for all non-file routes
    # This lets React handle /login, /tasks/1, etc. without 404s
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api requests to Kong — same as Vite's dev proxy
    # The React build calls /api/tasks, Nginx forwards it to Kong
    location /api {
        proxy_pass http://taskmanager-kong:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Cache static assets aggressively (Vite hashes filenames on build)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
