services:

  # ============================================================
  # Kong API Gateway
  # Sits in front of all services. Handles routing, rate limiting,
  # CORS, and will handle JWT auth in a future step.
  # ============================================================
  kong:
    image: kong:3.7
    container_name: taskmanager-kong
    environment:
      KONG_DATABASE: "off"                        # DB-less mode — no database needed
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml     # path to config inside the container
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    ports:
      - "8000:8000"    # proxy — all API traffic goes through here
      - "8003:8001"    # admin API — mapped to 8003 on host (8001 taken by VistA)
    volumes:
      - ../gateway/kong.yml:/kong/kong.yml:ro     # mount config file (read-only)
    networks:
      - local-ai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # React Frontend (Nginx)
  # Serves the built React app and proxies /api to Kong
  # ============================================================
  taskmanager-frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: taskmanager-frontend
    ports:
      - "8090:80"
    networks:
      - local-ai-network
    restart: unless-stopped
    depends_on:
      - kong

  taskmanager-api:
    build:
      context: ../backend        # path to the Dockerfile
      dockerfile: Dockerfile
    container_name: taskmanager-api
    ports:
      - "8082:8080"              # still exposed directly for debugging — Kong is the main entry point
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/taskmanager
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: Nashville2025
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    networks:
      - local-ai-network
    restart: unless-stopped

# We declare the network as external — Docker Compose won't create or destroy it,
# it just attaches our containers to the already-running network.
networks:
  local-ai-network:
    external: true
